<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secret Hitler — Player</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e0c09;
    --surface: #1a1710;
    --surface2: #242018;
    --border: #3a3220;
    --gold: #c8a84b;
    --gold2: #e8c870;
    --red: #8b2020;
    --red2: #c43030;
    --blue: #1e3a5f;
    --blue2: #3a6ea8;
    --text: #e8dcc8;
    --muted: #8a7d6a;
    --liberal: #3a6ea8;
    --fascist: #8b2020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ===== JOIN SCREEN ===== */
  #join {
    align-items: center;
    justify-content: center;
    gap: 28px;
    text-align: center;
  }

  .logo {
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 52px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(200,168,75,0.3);
    line-height: 1;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .join-form {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
  }

  .input-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input[type=text] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  input[type=text]#playerName {
    text-transform: none;
    letter-spacing: normal;
  }

  input[type=text]:focus {
    border-color: var(--gold);
  }

  .btn {
    background: var(--gold);
    color: #0e0c09;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }

  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn:disabled { opacity: 0.4; }

  .btn-liberal {
    background: var(--blue);
    color: #fff;
    border: 1px solid var(--blue2);
  }

  .btn-fascist {
    background: var(--red);
    color: #fff;
    border: 1px solid var(--red2);
  }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: none;
    font-size: 12px;
  }

  /* ===== LOBBY ===== */
  #lobby {
    gap: 24px;
  }

  .lobby-header {
    text-align: center;
  }

  .waiting-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .pulse {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  .player-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .player-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .player-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(200,168,75,0.12);
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--gold);
    flex-shrink: 0;
  }

  .player-name-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  /* ===== ROLE REVEAL ===== */
  #roleReveal {
    align-items: center;
    justify-content: flex-start;
    gap: 0;
    padding: 0;
  }

  .role-card {
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 24px;
    text-align: center;
  }

  .role-card.liberal-card {
    background: linear-gradient(180deg, #0a1525 0%, #0e1c35 100%);
  }

  .role-card.fascist-card {
    background: linear-gradient(180deg, #1a0808 0%, #220e0e 100%);
  }

  .role-card.hitler-card {
    background: linear-gradient(180deg, #1a0808 0%, #0e0808 100%);
  }

  .role-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .role-name {
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 64px;
    line-height: 1;
  }

  .role-name.liberal { color: #6ba3d6; }
  .role-name.fascist { color: #e05050; }
  .role-name.hitler { color: #ff4444; }

  .role-desc {
    font-size: 16px;
    line-height: 1.6;
    color: var(--muted);
    max-width: 280px;
  }

  .role-info-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 16px;
    width: 100%;
    max-width: 300px;
    text-align: left;
  }

  .role-info-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 10px;
  }

  .fascist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .fascist-item:last-child { border-bottom: none; }

  .fascist-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(196,48,48,0.2);
    color: #e05050;
    border: 1px solid rgba(196,48,48,0.4);
    white-space: nowrap;
  }

  .fascist-badge.is-hitler {
    background: rgba(255,68,68,0.2);
    color: #ff6060;
    border-color: rgba(255,68,68,0.5);
  }

  .tap-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    animation: fadeAnim 2s infinite;
  }

  @keyframes fadeAnim { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ===== MAIN GAME ===== */
  #game {
    gap: 16px;
    padding-bottom: 32px;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .header-name {
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 20px;
    color: var(--gold);
  }

  .header-role-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge-liberal { background: rgba(58,110,168,0.2); color: var(--blue2); border: 1px solid rgba(58,110,168,0.4); }
  .badge-fascist { background: rgba(139,32,32,0.2); color: #e05050; border: 1px solid rgba(139,32,32,0.4); }
  .badge-hitler { background: rgba(255,68,68,0.15); color: #ff6060; border: 1px solid rgba(255,68,68,0.4); }

  /* STATUS CARD */
  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .status-card-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .status-card-main {
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 26px;
    color: var(--gold);
  }

  .status-card-sub {
    font-size: 14px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* MINI TRACKS */
  .mini-tracks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .mini-track {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .mini-track-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .mini-track-label.lib { color: var(--blue2); }
  .mini-track-label.fas { color: #e05050; }

  .mini-tiles {
    display: flex;
    gap: 4px;
  }

  .mini-tile {
    width: 18px;
    height: 24px;
    border-radius: 2px;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: all 0.3s;
  }

  .mini-tile.enacted-liberal { background: var(--blue); border-color: var(--blue2); }
  .mini-tile.enacted-fascist { background: var(--red); border-color: var(--red2); }

  /* GOVERNMENT */
  .gov-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .gov-mini {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }

  .gov-mini-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .gov-mini-name {
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 20px;
    color: var(--gold2);
  }

  /* ACTION ZONE */
  .action-zone {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .action-zone.inactive {
    border-color: var(--border);
    opacity: 0.7;
  }

  .action-zone-title {
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 28px;
    color: var(--gold);
    text-align: center;
  }

  .action-zone-desc {
    font-size: 15px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  /* VOTE BUTTONS */
  .vote-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .vote-btn {
    padding: 20px;
    border-radius: 10px;
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 36px;
    border: 2px solid;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    background: transparent;
  }

  .vote-btn.ja-btn {
    color: var(--blue2);
    border-color: var(--blue2);
  }

  .vote-btn.ja-btn:active, .vote-btn.ja-btn.selected {
    background: var(--blue);
    border-color: var(--blue2);
    transform: scale(0.97);
  }

  .vote-btn.nein-btn {
    color: #e05050;
    border-color: #e05050;
  }

  .vote-btn.nein-btn:active, .vote-btn.nein-btn.selected {
    background: var(--red);
    border-color: var(--red2);
    transform: scale(0.97);
  }

  .vote-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }

  /* POLICY CARDS */
  .policy-cards {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .policy-card-btn {
    width: 90px;
    height: 130px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    font-family: 'UnifrakturMaguntia', serif;
  }

  .policy-card-btn.liberal-policy {
    border-color: var(--blue2);
    background: rgba(30,58,95,0.6);
    color: var(--blue2);
  }

  .policy-card-btn.fascist-policy {
    border-color: var(--red2);
    background: rgba(139,32,32,0.6);
    color: #e05050;
  }

  .policy-card-btn:active {
    transform: scale(0.95);
    opacity: 0.85;
  }

  .policy-icon { font-size: 32px; }
  .policy-text { font-size: 18px; }

  /* PLAYER SELECT */
  .player-select-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .player-select-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .player-select-item:active {
    border-color: var(--gold);
    background: rgba(200,168,75,0.08);
    transform: scale(0.98);
  }

  /* NOTIFICATION */
  .notification {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    z-index: 300;
    text-align: center;
    max-width: 80vw;
    animation: slideDown 0.3s ease;
  }

  @keyframes slideDown { from{opacity:0;top:-20px} to{opacity:1;top:20px} }

  /* PEEK CARDS */
  .peek-cards {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 8px 0;
  }

  .peek-tile {
    width: 52px;
    height: 72px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    border: 1.5px solid;
  }

  .peek-tile.liberal { background: rgba(30,58,95,0.5); border-color: var(--blue2); }
  .peek-tile.fascist { background: rgba(139,32,32,0.5); border-color: var(--red2); }

  /* INVESTIGATE RESULT */
  .investigate-result {
    text-align: center;
    padding: 20px;
  }

  .investigate-party {
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 48px;
    margin-top: 8px;
  }

  .investigate-party.liberal { color: var(--blue2); }
  .investigate-party.fascist { color: #e05050; }

  /* GAME OVER */
  #gameOver {
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
  }

  .gameover-title {
    font-family: 'UnifrakturMaguntia', serif;
    font-size: 56px;
    line-height: 1;
  }

  .gameover-title.liberal { color: var(--blue2); }
  .gameover-title.fascist { color: #e05050; }

  .roles-reveal {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .role-reveal-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }
  .connecting-msg {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 12px;
  }
</style>
</head>
<body>

<!-- JOIN -->
<div id="join" class="screen active">
  <div class="logo">Secret Hitler</div>
  <div class="subtitle">Player App</div>

  <div class="join-form">
    <div class="input-group">
      <div class="input-label">Your Name</div>
      <input type="text" id="playerName" placeholder="Enter name" maxlength="16" autocomplete="off">
    </div>
    <div class="input-group">
      <div class="input-label">Room Code</div>
      <input type="text" id="roomCode" placeholder="XXXXX" maxlength="5" autocomplete="off">
    </div>
    <button class="btn" id="joinBtn" onclick="joinGame()">Join Game</button>
    <div class="connecting-msg hidden" id="joinStatus">
      <div style="display:flex;align-items:center;justify-content:center;gap:10px">
        <div class="spinner"></div> Connecting...
      </div>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <div class="lobby-header">
    <div style="font-family:'UnifrakturMaguntia',serif;font-size:36px;color:var(--gold)">Secret Hitler</div>
    <div style="margin-top:8px">
      <span class="waiting-badge">
        <div class="pulse"></div>
        Waiting for host to start
      </span>
    </div>
  </div>

  <div>
    <div style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px">
      Players in room
    </div>
    <div class="player-list" id="lobbyPlayerList"></div>
  </div>
</div>

<!-- ROLE REVEAL -->
<div id="roleReveal" class="screen">
  <div class="role-card" id="roleCard" onclick="dismissRole()">
    <div class="role-eyebrow" id="roleEyebrow">Your Secret Role</div>
    <div class="role-name" id="roleName">—</div>
    <div class="role-desc" id="roleDesc">Loading...</div>
    <div class="role-info-box hidden" id="roleInfoBox">
      <div class="role-info-title" id="roleInfoTitle">Known Fascists</div>
      <div id="roleInfoContent"></div>
    </div>
    <div class="tap-hint">Tap to continue</div>
  </div>
</div>

<!-- MAIN GAME -->
<div id="game" class="screen">
  <div class="game-header">
    <div class="header-name" id="myNameHeader">—</div>
    <div class="header-role-badge" id="myRoleBadge">—</div>
  </div>

  <!-- STATUS -->
  <div class="status-card" id="statusCard">
    <div class="status-card-title">Phase</div>
    <div class="status-card-main" id="gamePhaseLabel">Election</div>
    <div class="status-card-sub" id="gamePhaseDesc">Waiting...</div>
  </div>

  <!-- MINI TRACKS -->
  <div class="mini-tracks">
    <div class="mini-track">
      <div class="mini-track-label lib">🕊 Liberal</div>
      <div class="mini-tiles" id="miniLibTrack"></div>
    </div>
    <div class="mini-track">
      <div class="mini-track-label fas">☠ Fascist</div>
      <div class="mini-tiles" id="miniFasTrack"></div>
    </div>
  </div>

  <!-- GOV -->
  <div class="gov-row">
    <div class="gov-mini">
      <div class="gov-mini-label">President</div>
      <div class="gov-mini-name" id="govPresident">—</div>
    </div>
    <div class="gov-mini">
      <div class="gov-mini-label">Chancellor</div>
      <div class="gov-mini-name" id="govChancellor">—</div>
    </div>
  </div>

  <!-- ACTION ZONE -->
  <div class="action-zone inactive" id="actionZone">
    <div class="action-zone-title" id="actionZoneTitle">Waiting</div>
    <div class="action-zone-desc" id="actionZoneDesc">Follow the host screen</div>
    <div id="actionZoneContent"></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="screen">
  <div class="gameover-title" id="gameOverTitle">—</div>
  <div style="font-family:'UnifrakturMaguntia',serif;font-size:28px;color:var(--gold)">Victory!</div>
  <div style="font-size:16px;color:var(--muted);text-align:center" id="gameOverReason">—</div>
  <div class="roles-reveal" id="rolesReveal"></div>
  <button class="btn" style="margin-top:8px;" onclick="location.reload()">New Game</button>
</div>

<script>
let peer, hostConn;
let myId, myName, myRole, myParty;
let gameData = {
  players: [],
  liberalPolicies: 0,
  fascistPolicies: 0,
  president: '—',
  chancellor: '—',
  phase: 'lobby',
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showNotification(msg, duration=3000) {
  const existing = document.querySelector('.notification');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'notification';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// JOIN
function joinGame() {
  const name = document.getElementById('playerName').value.trim();
  const code = document.getElementById('roomCode').value.trim().toUpperCase();
  if(!name || code.length < 3) { showNotification('Enter your name and room code'); return; }

  myName = name;
  document.getElementById('joinBtn').disabled = true;
  document.getElementById('joinStatus').classList.remove('hidden');

  const randomSuffix = Math.random().toString(36).substr(2,6);
  peer = new Peer('sh-player-' + randomSuffix, {
    host: '0.peerjs.com', port: 443, path: '/', secure: true,
    config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
  });

  peer.on('open', (id) => {
    myId = id;
    hostConn = peer.connect('sh-host-' + code, { reliable: true });
    hostConn.on('open', () => {
      hostConn.send({ type: 'join', payload: { name: myName } });
    });
    hostConn.on('data', handleHostMessage);
    hostConn.on('error', () => showNotification('Connection failed'));
    hostConn.on('close', () => showNotification('Disconnected from host'));
  });

  peer.on('error', (e) => {
    showNotification('Error: ' + e.type);
    document.getElementById('joinBtn').disabled = false;
    document.getElementById('joinStatus').classList.add('hidden');
  });
}

function sendToHost(type, payload={}) {
  if(hostConn) hostConn.send({ type, payload });
}

function handleHostMessage(data) {
  const { type, payload } = data;
  switch(type) {
    case 'error':
      showNotification(payload);
      document.getElementById('joinBtn').disabled = false;
      document.getElementById('joinStatus').classList.add('hidden');
      break;
    case 'lobby_update':
      showScreen('lobby');
      document.getElementById('lobbyPlayerList').innerHTML = payload.players.map(p =>
        `<div class="player-item">
          <div class="player-avatar">${p.name[0].toUpperCase()}</div>
          <div class="player-name-text">${p.name}${p.id === myId ? ' (You)' : ''}</div>
        </div>`
      ).join('');
      break;
    case 'game_start':
      myRole = payload.role;
      myParty = payload.party;
      gameData.players = payload.players;
      showRoleCard(payload);
      break;
    case 'nominate':
      showNominateAction(payload.eligiblePlayers);
      break;
    case 'vote_request':
      showVoteAction(payload.presidentName, payload.chancellorName);
      break;
    case 'vote_result':
      showVoteResult(payload);
      break;
    case 'chaos_policy':
      showNotification(`⚠ Chaos! ${payload.policy.toUpperCase()} policy enacted!`, 4000);
      break;
    case 'policy_enacted':
      gameData.liberalPolicies = payload.liberal;
      gameData.fascistPolicies = payload.fascist;
      updateMiniTracks();
      showNotification(`Policy enacted: ${payload.policy.toUpperCase()}`, 3000);
      setActionInactive('Policy Enacted', `A ${payload.policy} policy was passed.`);
      break;
    case 'legislative_president':
      showPresidentLegislative(payload.cards);
      break;
    case 'legislative_chancellor':
      showChancellorLegislative(payload.cards, payload.vetoAvailable);
      break;
    case 'power_peek':
      showPeekPower(payload.cards);
      break;
    case 'power_investigate':
      showInvestigatePower(payload.eligiblePlayers);
      break;
    case 'power_special_election':
      showSpecialElectionPower(payload.eligiblePlayers);
      break;
    case 'power_execute':
      showExecutePower(payload.eligiblePlayers);
      break;
    case 'investigate_result':
      showInvestigateResult(payload.targetName, payload.party);
      break;
    case 'player_executed':
      showNotification(`💀 ${payload.targetName} has been executed`, 4000);
      setActionInactive('Execution', `${payload.targetName} was removed from the game.`);
      break;
    case 'veto_request':
      showVetoRequest();
      break;
    case 'veto_rejected':
      showChancellorLegislative(payload.cards, false);
      showNotification('Veto rejected — choose a policy');
      break;
    case 'veto_accepted':
      setActionInactive('Veto Accepted', 'Both policies were discarded.');
      break;
    case 'game_over':
      showGameOver(payload);
      break;
    default:
      // Check for president/chancellor updates embedded in other events
      if(payload && payload.presidentName) gameData.president = payload.presidentName;
      if(payload && payload.chancellorName) gameData.chancellor = payload.chancellorName;
  }
}

// ROLE CARD
function showRoleCard(payload) {
  const card = document.getElementById('roleCard');
  const roleName = document.getElementById('roleName');
  const roleDesc = document.getElementById('roleDesc');
  const roleEyebrow = document.getElementById('roleEyebrow');
  const infoBox = document.getElementById('roleInfoBox');
  const infoContent = document.getElementById('roleInfoContent');
  const infoTitle = document.getElementById('roleInfoTitle');

  card.className = 'role-card ' + (myRole === 'liberal' ? 'liberal-card' : myRole === 'hitler' ? 'hitler-card' : 'fascist-card');
  roleName.className = 'role-name ' + myRole;
  roleName.textContent = myRole.charAt(0).toUpperCase() + myRole.slice(1);

  if(myRole === 'liberal') {
    roleEyebrow.textContent = 'Your Secret Role';
    roleDesc.textContent = 'Find and stop the fascists. Enact liberal policies and identify Hitler to win. Trust your allies, but verify.';
    infoBox.classList.add('hidden');
  } else if(myRole === 'hitler') {
    roleEyebrow.textContent = 'Your Secret Role';
    roleDesc.textContent = 'Play as a Liberal. Gain the trust of the people. Your fascist allies know you — find them. Get elected Chancellor after 3 fascist policies.';
    if(payload.fascists && payload.fascists.length <= 2 && gameData.players.length <= 6) {
      // In 5-6 player games, Hitler knows the fascist
      infoBox.classList.remove('hidden');
      infoTitle.textContent = 'Your Fascist Ally';
      infoContent.innerHTML = payload.fascists.filter(f=>!f.isHitler).map(f =>
        `<div class="fascist-item"><span class="fascist-badge">Fascist</span><span style="font-size:15px">${f.name}</span></div>`
      ).join('');
    } else {
      infoBox.classList.add('hidden');
    }
  } else {
    roleEyebrow.textContent = 'Your Secret Role';
    roleDesc.textContent = 'Secretly enact fascist policies and help Hitler gain power. Sabotage liberals without revealing yourself.';
    infoBox.classList.remove('hidden');
    infoTitle.textContent = 'Your Team';
    infoContent.innerHTML = (payload.fascists || []).map(f =>
      `<div class="fascist-item"><span class="fascist-badge ${f.isHitler?'is-hitler':''}">${f.isHitler?'Hitler':'Fascist'}</span><span style="font-size:15px">${f.name}</span></div>`
    ).join('');
  }

  showScreen('roleReveal');
}

function dismissRole() {
  showScreen('game');
  document.getElementById('myNameHeader').textContent = myName;
  const badgeClass = myRole === 'liberal' ? 'badge-liberal' : myRole === 'hitler' ? 'badge-hitler' : 'badge-fascist';
  document.getElementById('myRoleBadge').className = 'header-role-badge ' + badgeClass;
  document.getElementById('myRoleBadge').textContent = myRole;
  updateMiniTracks();
  // setActionInactive('Game Started', 'Follow the host screen for the current phase.');
}

function updateMiniTracks() {
  const lib = document.getElementById('miniLibTrack');
  const fas = document.getElementById('miniFasTrack');
  lib.innerHTML = '';
  fas.innerHTML = '';
  for(let i=0;i<5;i++) {
    const t = document.createElement('div');
    t.className = 'mini-tile' + (i < gameData.liberalPolicies ? ' enacted-liberal' : '');
    lib.appendChild(t);
  }
  for(let i=0;i<6;i++) {
    const t = document.createElement('div');
    t.className = 'mini-tile' + (i < gameData.fascistPolicies ? ' enacted-fascist' : '');
    fas.appendChild(t);
  }
}

function setActionActive(title, desc, content='') {
  const zone = document.getElementById('actionZone');
  zone.className = 'action-zone';
  document.getElementById('actionZoneTitle').textContent = title;
  document.getElementById('actionZoneDesc').textContent = desc;
  document.getElementById('actionZoneContent').innerHTML = content;
}

function setActionInactive(title, desc) {
  const zone = document.getElementById('actionZone');
  zone.className = 'action-zone inactive';
  document.getElementById('actionZoneTitle').textContent = title;
  document.getElementById('actionZoneDesc').textContent = desc;
  document.getElementById('actionZoneContent').innerHTML = '';
}

function updateGov(president, chancellor) {
  if(president) { gameData.president = president; document.getElementById('govPresident').textContent = president; }
  if(chancellor) { gameData.chancellor = chancellor; document.getElementById('govChancellor').textContent = chancellor; }
}

// NOMINATE
function showNominateAction(eligiblePlayers) {
  updateGov(myName, null);
  document.getElementById('govChancellor').textContent = '—';
  setActionActive('Nominate Chancellor', 'Choose your Chancellor candidate:', buildPlayerSelectHTML(eligiblePlayers, 'selectChancellor'));
}

function buildPlayerSelectHTML(players, fn) {
  return `<div class="player-select-list">${players.map(p =>
    `<div class="player-select-item" onclick="${fn}('${p.id}','${p.name}')">
      <div class="player-avatar" style="width:28px;height:28px;font-size:12px">${p.name[0].toUpperCase()}</div>
      <div style="font-size:16px;font-weight:600">${p.name}</div>
    </div>`
  ).join('')}</div>`;
}

function selectChancellor(id, name) {
  sendToHost('nominate', { chancellorId: id });
  updateGov(null, name);
  document.getElementById('govChancellor').textContent = name;
  setActionInactive('Nominated', `You nominated ${name} as Chancellor.`);
}

// VOTE
function showVoteAction(presName, chanName) {
  updateGov(presName, chanName);
  document.getElementById('govPresident').textContent = presName;
  document.getElementById('govChancellor').textContent = chanName;
  setActionActive('Vote', `${presName} + ${chanName} — vote to elect this government:`,
    `<div class="vote-btns">
      <button class="vote-btn ja-btn" onclick="castVote('ja')" id="voteJa">
        Ja!<span class="vote-label">Yes</span>
      </button>
      <button class="vote-btn nein-btn" onclick="castVote('nein')" id="voteNein">
        Nein<span class="vote-label">No</span>
      </button>
    </div>`
  );
}

function castVote(v) {
  sendToHost('vote', { vote: v });
  document.getElementById('voteJa').classList.toggle('selected', v==='ja');
  document.getElementById('voteNein').classList.toggle('selected', v==='nein');
  document.getElementById('voteJa').disabled = true;
  document.getElementById('voteNein').disabled = true;
  document.getElementById('actionZoneDesc').textContent = `You voted: ${v==='ja'?'Ja!':'Nein'}. Waiting for others...`;
}

function showVoteResult(payload) {
  const resultText = payload.passed ? '✓ Government elected!' : '✗ Vote failed!';
  const details = `${payload.jas} Ja / ${payload.neins} Nein`;
  setActionInactive(resultText, details);
  showNotification(payload.passed ? `✓ Government elected (${payload.jas}–${payload.neins})` : `✗ Vote failed (${payload.jas}–${payload.neins})`, 3000);
}

// LEGISLATIVE — PRESIDENT
function showPresidentLegislative(cards) {
  const cardsHTML = cards.map((c,i) =>
    `<button class="policy-card-btn ${c}-policy" onclick="presidentDiscard('${c}',${i})">
      <span class="policy-icon">${c==='liberal'?'🕊':'☠'}</span>
      <span class="policy-text">${c.charAt(0).toUpperCase()+c.slice(1)}</span>
    </button>`
  ).join('');

  setActionActive('Discard a Policy', 'You are President. Discard one policy tile — pass the other two to the Chancellor.',
    `<div class="policy-cards">${cardsHTML}</div>`
  );
}

const _discardedCard = { value: null, used: false };
function presidentDiscard(card, idx) {
  if(_discardedCard.used) return;
  _discardedCard.used = true;
  sendToHost('discard_policy', { card });
  setActionInactive('Discarded', `You discarded: ${card}. Waiting for Chancellor...`);
  _discardedCard.used = false;
}

// LEGISLATIVE — CHANCELLOR
function showChancellorLegislative(cards, vetoAvailable) {
  let vetoBtn = '';
  if(vetoAvailable) {
    vetoBtn = `<button class="btn btn-outline" style="margin-top:8px;font-size:12px" onclick="requestVeto()">Request Veto</button>`;
  }

  const cardsHTML = cards.map((c,i) =>
    `<button class="policy-card-btn ${c}-policy" onclick="chancellorEnact('${c}',${i})">
      <span class="policy-icon">${c==='liberal'?'🕊':'☠'}</span>
      <span class="policy-text">${c.charAt(0).toUpperCase()+c.slice(1)}</span>
    </button>`
  ).join('');

  setActionActive('Enact a Policy', 'You are Chancellor. Choose one policy to enact.',
    `<div class="policy-cards">${cardsHTML}</div>${vetoBtn}`
  );
}

function chancellorEnact(card) {
  sendToHost('discard_policy', { card: card });
  setActionInactive('Policy Enacted', `You enacted: ${card}.`);
}

function requestVeto() {
  sendToHost('veto_request', {});
  setActionInactive('Veto Requested', 'Waiting for President to accept or reject the veto...');
}

// VETO REQUEST (for president)
function showVetoRequest() {
  setActionActive('Veto Request', 'The Chancellor wants to veto both policies. Do you consent?',
    `<div style="display:flex;gap:10px;justify-content:center;margin-top:4px">
      <button class="btn" style="flex:1;background:var(--blue);color:#fff" onclick="respondVeto(true)">Accept Veto</button>
      <button class="btn btn-outline" style="flex:1" onclick="respondVeto(false)">Reject Veto</button>
    </div>`
  );
}

function respondVeto(accept) {
  sendToHost('veto_response', { accept });
  setActionInactive(accept?'Veto Accepted':'Veto Rejected', accept?'Both policies discarded.':'Chancellor must enact a policy.');
}

// EXECUTIVE POWERS
function showPeekPower(cards) {
  const tilesHTML = cards.map(c =>
    `<div class="peek-tile ${c}">${c==='liberal'?'🕊':'☠'}</div>`
  ).join('');
  setActionActive('Policy Peek', 'You secretly see the top 3 policy tiles:',
    `<div class="peek-cards">${tilesHTML}</div>
     <p style="font-size:13px;color:var(--muted);text-align:center;margin-top:4px">Keep this information secret (or lie).</p>`
  );
}

function showInvestigatePower(players) {
  setActionActive('Investigate Loyalty', 'Choose a player to investigate their party membership:',
    buildPlayerSelectHTML(players, 'investigatePlayer')
  );
}

function investigatePlayer(id, name) {
  sendToHost('power_investigate_target', { targetId: id });
  setActionInactive('Investigating...', `Revealing ${name}'s party card...`);
}

function showInvestigateResult(targetName, party) {
  setActionActive('Investigation Result',
    `${targetName}'s party membership:`,
    `<div class="investigate-result">
      <div class="investigate-party ${party}">${party.charAt(0).toUpperCase()+party.slice(1)}</div>
      <p style="font-size:13px;color:var(--muted);margin-top:8px">You may share this (or lie) at your discretion.</p>
    </div>`
  );
}

function showSpecialElectionPower(players) {
  setActionActive('Special Election', 'Choose the next Presidential Candidate:',
    buildPlayerSelectHTML(players, 'specialElect')
  );
}

function specialElect(id, name) {
  sendToHost('power_special_election_target', { targetId: id });
  setActionInactive('Special Election', `${name} will be the next Presidential candidate.`);
}

function showExecutePower(players) {
  setActionActive('Execution', 'You must execute one player:',
    buildPlayerSelectHTML(players, 'executePlayer')
  );
}

function executePlayer(id, name) {
  if(!confirm(`Execute ${name}?`)) return;
  sendToHost('power_execute_target', { targetId: id });
  setActionInactive('Executed', `${name} has been executed.`);
}

// GAME OVER
function showGameOver(payload) {
  showScreen('gameOver');
  const title = document.getElementById('gameOverTitle');
  title.textContent = payload.winner === 'liberal' ? 'Liberals Win' : 'Fascists Win';
  title.className = 'gameover-title ' + payload.winner;
  document.getElementById('gameOverReason').textContent = payload.reason;

  const rr = document.getElementById('rolesReveal');
  if(payload.roles) {
    rr.innerHTML = payload.roles.map(p =>
      `<div class="role-reveal-item">
        <div style="font-size:16px;font-weight:600">${p.name}${p.id===myId?' (You)':''}</div>
        <span class="header-role-badge badge-${p.role==='liberal'?'liberal':p.role==='hitler'?'hitler':'fascist'}" style="font-size:10px;padding:3px 8px">${p.role}</span>
      </div>`
    ).join('');
  }
}

// Also handle nominate event from host (host directly calls this after player sends nominate)
// The host sends back updated state — we just update UI based on what we receive

// Override document title once we have a name
document.getElementById('playerName').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('roomCode').focus();
});
document.getElementById('roomCode').addEventListener('keydown', e => {
  if(e.key === 'Enter') joinGame();
});
</script>
